<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="nx" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#01cdfe"/>
      <stop offset="50%" stop-color="#b967ff"/>
      <stop offset="100%" stop-color="#ff71ce"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#0d0221"/>

  <!-- Orbital 1 — teal -->
  <ellipse cx="32" cy="32" rx="25" ry="9"
           stroke="#01cdfe" stroke-width="2.5" fill="none" opacity="0.9"/>

  <!-- Orbital 2 — purple -->
  <ellipse cx="32" cy="32" rx="25" ry="9"
           transform="rotate(60 32 32)"
           stroke="#b967ff" stroke-width="2.5" fill="none" opacity="0.9"/>

  <!-- Orbital 3 — pink -->
  <ellipse cx="32" cy="32" rx="25" ry="9"
           transform="rotate(120 32 32)"
           stroke="#ff71ce" stroke-width="2.5" fill="none" opacity="0.9"/>

  <!-- Satellite nodes -->
  <circle cx="57"   cy="32"   r="2.5" fill="#01cdfe"/>
  <circle cx="7"    cy="32"   r="2.5" fill="#01cdfe"/>
  <circle cx="44.5" cy="53.7" r="2.5" fill="#b967ff"/>
  <circle cx="19.5" cy="10.3" r="2.5" fill="#b967ff"/>
  <circle cx="19.5" cy="53.7" r="2.5" fill="#ff71ce"/>
  <circle cx="44.5" cy="10.3" r="2.5" fill="#ff71ce"/>

  <!-- Central nexus -->
  <circle cx="32" cy="32" r="7" fill="url(#nx)"/>
  <circle cx="32" cy="32" r="3" fill="white" opacity="0.5"/>
</svg>
