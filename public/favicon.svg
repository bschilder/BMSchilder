<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#01cdfe"/>
      <stop offset="50%" stop-color="#b967ff"/>
      <stop offset="100%" stop-color="#ff71ce"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#0d0221"/>

  <!-- DNA strand 1 -->
  <path d="M18 8 C24 18, 24 26, 18 32 C12 38, 12 46, 18 56"
        stroke="url(#fg)" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- DNA strand 2 -->
  <path d="M46 8 C40 18, 40 26, 46 32 C52 38, 52 46, 46 56"
        stroke="url(#fg)" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Rungs -->
  <line x1="22" y1="14" x2="42" y2="14" stroke="url(#fg)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="20" y1="23" x2="44" y2="23" stroke="url(#fg)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="20" y1="41" x2="44" y2="41" stroke="url(#fg)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="50" x2="42" y2="50" stroke="url(#fg)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Central node -->
  <circle cx="32" cy="32" r="8" stroke="url(#fg)" stroke-width="3" fill="none"/>
  <circle cx="32" cy="32" r="3.5" fill="url(#fg)"/>
</svg>
