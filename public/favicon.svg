  <path d="M50.4,51.8 Q32.1,32.1 13.6,12.2" stroke="#01cdfe" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>

  <!-- Distance-3 arcs: purple + pink rotated square -->
  <path d="M32,6 Q31.3,31.3 13.6,12.2" stroke="#b967ff" stroke-width="2" fill="none" opacity="0.55" stroke-linecap="round"/>
  <path d="M58,32 Q32.2,31.3 50.4,51.8" stroke="#ff71ce" stroke-width="2" fill="none" opacity="0.55" stroke-linecap="round"/>
  <path d="M32,58 Q32.7,32.7 50.4,51.8" stroke="#b967ff" stroke-width="2" fill="none" opacity="0.55" stroke-linecap="round"/>
  <path d="M6,32 Q31.8,32.7 13.6,12.2" stroke="#ff71ce" stroke-width="2" fill="none" opacity="0.55" stroke-linecap="round"/>

  <!-- Nodes -->
  <circle cx="32" cy="6" r="4" fill="#01cdfe"/>
  <circle cx="50.4" cy="12.2" r="4" fill="#b967ff"/>
  <circle cx="58" cy="32" r="4" fill="#ff71ce"/>
  <circle cx="50.4" cy="51.8" r="4" fill="#01cdfe"/>
  <circle cx="32" cy="58" r="4" fill="#b967ff"/>
  <circle cx="13.6" cy="51.8" r="4" fill="#ff71ce"/>
  <circle cx="6" cy="32" r="4" fill="#01cdfe"/>
